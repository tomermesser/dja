name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only run for repo owner/collaborators
    if: |
      github.actor == 'tomermesser' ||
      (github.event_name == 'issue_comment' && github.event.issue.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.author_association == 'OWNER')
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
